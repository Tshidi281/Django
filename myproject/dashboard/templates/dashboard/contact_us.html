<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Johannesburg E-Services</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #007bff;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .contact-info {
            margin-bottom: 30px;
        }
        .contact-item {
            margin-bottom: 15px;
        }
        .contact-label {
            font-weight: bold;
            color: #333;
        }
        .contact-value {
            color: #666;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea.form-control {
            height: 100px;
            resize: vertical;
        }
        .btn {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .messages {
            margin-bottom: 20px;
        }
        .message {
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 10px;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Contact Us</h1>
        </div>
        
        <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>
        
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <div class="contact-item">
                <span class="contact-label">Email:</span>
                <span class="contact-value">support@joburg.org.za</span>
            </div>
            <div class="contact-item">
                <span class="contact-label">Phone:</span>
                <span class="contact-value">011 375 5555</span>
            </div>
            <div class="contact-item">
                <span class="contact-label">Office Hours:</span>
                <span class="contact-value">Monday - Friday: 8:00 AM - 4:30 PM</span>
            </div>
        </div>
        
        <h2>Send us a Message</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" name="subject" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea name="message" class="form-control" placeholder="Type your message here..." required></textarea>
            </div>
            
            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>
</body>
</html>
