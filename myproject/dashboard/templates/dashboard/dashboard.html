<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Johannesburg E-Services</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .welcome {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 16px;
            color: #666;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .menu-item {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            border: 1px solid #ddd;
            transition: background-color 0.3s;
        }
        .menu-item:hover {
            background-color: #e9ecef;
        }
        .menu-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .menu-description {
            font-size: 14px;
            color: #666;
        }
        .logout {
            text-align: center;
            margin-top: 30px;
        }
        .btn {
            background-color: #dc3545;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 3px;
            font-size: 14px;
        }
        .btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="welcome">Welcome, {{ user.first_name|default:user.username }}!</h1>
            <p class="subtitle">Johannesburg E-Services Dashboard</p>
        </div>
        
        <div class="menu-grid">
            <a href="{% url 'view_estatement' %}" class="menu-item">
                <div class="menu-title">View E-Statement</div>
                <div class="menu-description">Access your electronic statements</div>
            </a>
            
            <a href="{% url 'report_issue' %}" class="menu-item">
                <div class="menu-title">Report an Issue</div>
                <div class="menu-description">Report problems or concerns</div>
            </a>
            
            <a href="{% url 'how_do_i' %}" class="menu-item">
                <div class="menu-title">How Do I</div>
                <div class="menu-description">Get help and instructions</div>
            </a>
            
            <a href="{% url 'contact_us' %}" class="menu-item">
                <div class="menu-title">Contact Us</div>
                <div class="menu-description">Get in touch with support</div>
            </a>
        </div>
        
        <div class="logout">
            <a href="{% url 'home' %}" class="btn">Logout</a>
        </div>
    </div>
</body>
</html>
