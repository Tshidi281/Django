<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Do I - Johannesburg E-Services</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #007bff;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .help-section {
            margin-bottom: 30px;
        }
        .help-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .help-content {
            color: #666;
            line-height: 1.5;
        }
        .faq-item {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 3px;
        }
        .question {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .answer {
            color: #666;
            display: none;
            margin-top: 10px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 3px;
        }
        .faq-item.active .answer {
            display: block;
        }
        .faq-item {
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 3px;
            transition: background-color 0.3s;
        }
        .faq-item:hover {
            background-color: #e9ecef;
        }
        .faq-item.active {
            background-color: #e9ecef;
            border-color: #007bff;
        }
    </style>
    <script>
        function toggleFAQ(id) {
            const allItems = document.querySelectorAll('.faq-item');
            const currentItem = document.getElementById('faq-' + id);
            
            // Close all other items
            allItems.forEach(item => {
                if (item !== currentItem) {
                    item.classList.remove('active');
                }
            });
            
            // Toggle current item
            currentItem.classList.toggle('active');
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>How Do I</h1>
        </div>
        
        <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>
        
        <div class="help-section">
            <h2 class="help-title">Frequently Asked Questions</h2>
            
            {% for faq in faq_data %}
            <div class="faq-item" id="faq-{{ faq.id }}" onclick="toggleFAQ('{{ faq.id }}')">
                <div class="question">{{ faq.question }}</div>
                <div class="answer">{{ faq.answer }}</div>
            </div>
            {% endfor %}
        </div>
        
        <div class="help-section">
            <h2 class="help-title">Need More Help?</h2>
            <p class="help-content">If you can't find the answer you're looking for, please contact our support team using the "Contact Us" option.</p>
        </div>
    </div>
</body>
</html>
